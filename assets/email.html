<!doctype html>
<html>
    <body
        style="
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        "
    >
        <table width="100%%" cellpadding="0" cellspacing="0">
            <tr>
                <td align="center" style="padding: 40px 0">
                    <table
                        width="600"
                        cellpadding="0"
                        cellspacing="0"
                        style="
                            background: #ffffff;
                            border-radius: 8px;
                            overflow: hidden;
                            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
                        "
                    >
                        <!-- Header -->
                        <tr>
                            <td
                                align="center"
                                style="background: #4f46e5; padding: 30px"
                            >
                                <img
                                    src="cid:logo.png"
                                    width="120"
                                    alt="Logo"
                                    style="display: block"
                                />
                            </td>
                        </tr>

                        <!-- Body -->
                        <tr>
                            <td align="center" style="padding: 40px 30px">
                                <h2 style="color: #1a1a1a; margin: 0 0 10px">
                                    Verification Code
                                </h2>
                                <p
                                    style="
                                        color: #666;
                                        font-size: 15px;
                                        margin: 0 0 30px;
                                    "
                                >
                                    Use the code below to verify your account.
                                    Expires in 5 minutes.
                                </p>

                                <!-- OTP Box -->
                                <div
                                    style="
                                        background: #f0f0ff;
                                        border: 2px dashed #4f46e5;
                                        border-radius: 8px;
                                        padding: 20px 40px;
                                        display: inline-block;
                                    "
                                >
                                    <span
                                        style="
                                            font-size: 36px;
                                            font-weight: bold;
                                            letter-spacing: 8px;
                                            color: #4f46e5;
                                        "
                                        >%s</span
                                    >
                                </div>
                            </td>
                        </tr>

                        <!-- Footer -->
                        <tr>
                            <td
                                align="center"
                                style="
                                    background: #f9f9f9;
                                    padding: 20px;
                                    border-top: 1px solid #eee;
                                "
                            >
                                <p
                                    style="
                                        color: #999;
                                        font-size: 12px;
                                        margin: 0;
                                    "
                                >
                                    If you didn't request this, ignore this
                                    email.
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
